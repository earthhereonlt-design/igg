<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/cat.png" />
    <link rel="apple-touch-icon" href="/cat.png" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="A premium IELTS productivity and tracking dashboard." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="IELTS Tracker" />
    <meta property="og:description" content="A premium IELTS productivity and tracking dashboard." />
    <meta property="og:image" content="/cat.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="IELTS Tracker" />
    <meta property="twitter:description" content="A premium IELTS productivity and tracking dashboard." />
    <meta property="twitter:image" content="/cat.png" />

    <title>IELTS Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(
            (registration) => { console.log('SW registered: ', registration); },
            (err) => { console.log('SW registration failed: ', err); }
          );
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
